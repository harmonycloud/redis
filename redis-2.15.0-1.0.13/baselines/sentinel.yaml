apiVersion: middleware.cn/v1
kind: MiddlewareBaseline
metadata:
  name: redis-sentinel
  labels:
    nephele/user: admin
  annotations:
    datapath: '{{ printf "/data/redis/cluster.local/%s/%s/{POD_NAME}/data" .Globe.Namespace .Globe.Name }}'
    baselineName: "哨兵模式"
    description: "哨兵模式基线,包含核心功能和必要依赖,适用于快速部署和基本应用场景,稳定可靠,易于扩展和维护."
spec:
  operatorBaseline:
    name: redis-operator-standard
    gvkName: v1alpha1
  necessary:
    repository: ""
    version: "7.2.8"
    resource:
      redis:
        limits:
          cpu: ""
          memory: ""
        requests:
          cpu: ""
          memory: ""
        replicas: "2"
        volume:
          size: ""
          storageClass: ""
      sentinel:
        limits:
          cpu: ""
          memory: ""
        requests:
          cpu: ""
          memory: ""
        replicas: "1"
  preActions:
    - name: pre-redis-logging
      parameters:
        fileLogging: true
        stdoutLogging: true
      fixed: false
      exposed: true
    - name: pre-redis-tolerations
      parameters:
        tolerations: []
      fixed: false
      exposed: true
    - name: pre-redis-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: {}
      fixed: false
      exposed: true
    # - name: pre-redis-sentinel-affinity
    #   parameters:
    #     podAntiAffinityTopologKey: "kubernetes.io/hostname"
    #     podAntiAffinity: "soft"
    #     nodeAffinity: {}
    #   fixed: false
    #   exposed: true
  parameters:
    env:
      TZ: Asia/Shanghai
    type: sentinel
    sentinel:
      affinity:
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: REDIS_INSTANCE_PORT
          value: "26379"
        - name: TYPE
          value: "sentinel"
        - name: PODIP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
      readinessProbe:
        exec:
          command:
            - sh
            - -c
            - redis-cli -h $POD_IP -p 26379 ping
        timeoutSeconds: 5
      livenessProbe:
        exec:
          command:
            - sh
            - -c
            - redis-cli -h $POD_IP -p 26379 ping
        timeoutSeconds: 5
      args: {}
      command: /bin/launch.sh
      hostNetwork: false
      port: 26379
      replicas: "{{ .Necessary.resource.sentinel.replicas }}"
      resources:
        requests:
          cpu: "{{ .Necessary.resource.sentinel.requests.cpu }}"
          memory: "{{ .Necessary.resource.sentinel.requests.memory }}"
        limits:
          cpu: "{{ .Necessary.resource.sentinel.limits.cpu }}"
          memory: "{{ .Necessary.resource.sentinel.limits.memory }}"
      securityContext: {}
      strategy:
        rollingUpdate:
          maxUnavailable: 1
        type: RollingUpdate
    pod:
      - affinity:
        annotations:
          fixed-node-middleware-pod: "true"
          fixed.ipam.harmonycloud.cn: "true"
        configmap: "{{ .Globe.Name }}-config"
        env:
          - name: SYS_CODE
            value: redis
        labels:
          harmonycloud.cn/statefulset: "{{ .Globe.Name }}"
          middleware: redis
          nephele/user: admin
        middlewareImage: '{{ if eq .Necessary.version "5.0.8" }}redis-cli-v5-port:5.0.8-1.1.1{{ else if eq .Necessary.version "6.2.6" }}redis-cli-v6-port:6.2.6-1.2.0{{ else if eq .Necessary.version "6.2.11" }}redis-cli-v6-port:6.2.11-1.2.0{{ else if eq .Necessary.version "6.2.14" }}redis-cli-v6-port:6.2.14-1.2.0{{ else if eq .Necessary.version "6.2.16" }}redis-cli-v6-port:6.2.16-1.0.0{{ else if eq .Necessary.version "6.2.18" }}redis-cli-v6-port:6.2.18-1.0.0{{ else if eq .Necessary.version "7.0.12" }}redis-cli-v7-port:7.0.12-1.2.0{{ else if eq .Necessary.version "7.0.15" }}redis-cli-v7-port:7.0.15{{ else if eq .Necessary.version "7.2.4" }}redis-cli-v7-port:7.2.4-1.2.0{{ else if eq .Necessary.version "7.2.8" }}redis-cli-v7-port:7.2.8-1.0.0{{ end }}'
        initImage: "redis-init:v1.7.3"
        monitorImage: "redis-exporter:v1.0.5-1.0.0"
        logrotateImage: "logrotate:3.21.0-1.0.0"
        requirepass: "Hc@Cloud01"
        imagePullPolicy: IfNotPresent
        hostNetwork: false
        resources:
          limits:
            cpu: "{{ .Necessary.resource.redis.limits.cpu }}"
            memory: "{{ .Necessary.resource.redis.limits.memory }}"
          requests:
            cpu: "{{ .Necessary.resource.redis.requests.cpu }}"
            memory: "{{ .Necessary.resource.redis.requests.memory }}"
        updateStrategy: {}
        command: /bin/launch.sh
    exporter:
      port: 9121
      rdbScan: {}
      sentinelPort: 9121
    podManagementPolicy: Parallel
    replicas: "{{ .Necessary.resource.redis.replicas }}"
    servicePort: 6379
    repository: "{{ .Necessary.repository }}/"
    updateStrategy:
      type: AutoReceive
    version: "{{ .Necessary.version }}"
    volumeClaimTemplates:
      - metadata:
          name: redis-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "{{ .Necessary.resource.redis.volume.storageClass }}"
          resources:
            requests:
              storage: "{{ .Necessary.resource.redis.volume.size }}"
  configurations:
    - name: redis-credential
      values:
        redis:
          port: "{{ (index .Parameters.pod 0).servicePort }}"
        redisPassword: "{{ (index .Parameters.pod 0).requirepass }}"
    - name: redis-predixy-servicemonitor
      values:
        predixy:
          enableProxy: '{{ if hasKey .Parameters "predixy" }}true{{ else }}flase{{ end }}'
    - name: redis-alert-rule
      values:
        type: "{{ .Parameters.type }}"
        predixy:
          enableProxy: '{{ if hasKey .Parameters "predixy" }}true{{ else }}flase{{ end }}'
    - name: redis-config
      values:
        type: "{{ .Parameters.type }}"
        version: "{{ .Parameters.version }}"
        customVolumes: {}
        additionArgs: {}
        args:
          maxmemory-policy: volatile-lru
          renameCommand:
            # - CONFIG ""
            # - SHUTDOWN ""
            - KEYS NOKEYS
            - FLUSHDB ""
            - FLUSHALL ""
    - name: redis-sc
      values:
        type: "{{ .Parameters.type }}"
        predixy:
          enableProxy: '{{ if hasKey .Parameters "predixy" }}true{{ else }}flase{{ end }}'
    - name: redis-servicemonitor
    - name: redis-shard-sc
      values:
        type: "{{ .Parameters.type }}"
        predixy:
          enableProxy: '{{ if hasKey .Parameters "predixy" }}true{{ else }}flase{{ end }}'
        redis:
          replicas: "{{ .Necessary.resource.redis.replicas }}"

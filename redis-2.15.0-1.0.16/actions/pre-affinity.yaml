apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: pre-redis-affinity
spec:
  baselineType: "PreAction"
  actionType: "affinity"
  necessary:
    podAntiAffinityTopologKey: "string"
    podAntiAffinity: "string"
    nodeAffinity: { }
  steps:
    - name: insert-parameters
      type: "KubectlEdit" # KubectlGet、KubectlEdit、KubectlExec、Exec、HTTP
      cue: |
        output: {
          spec: parameters.spec
        }
        parameters: {
          spec: {
            parameters: {
              pod: [
                {
                  {{- if eq (semverCompare ">= 1.19-0" .Capabilities.KubeVersion.Version) false }}
                  affinity: {
                    {{- if eq .Necessary.podAntiAffinity "hard"}}
                    podAntiAffinity: {
                      requiredDuringSchedulingIgnoredDuringExecution: [
                        {
                          labelSelector: {
                            matchExpressions: [
                              {
                                key: "app"
                                operator: "In"
                                values: ["{{ .Globe.Name }}"]
                              },
                            ]
                          }
                          topologyKey: "{{ .Necessary.podAntiAffinityTopologKey }}"
                        },
                      ]
                    }
                    {{- else if eq .Necessary.podAntiAffinity "soft"}}
                    podAntiAffinity: {
                      preferredDuringSchedulingIgnoredDuringExecution: [
                        {
                          weight: 100
                          podAffinityTerm: {
                            topologyKey: "{{ .Necessary.podAntiAffinityTopologKey }}"
                            labelSelector: {
                              matchExpressions: [
                                {
                                  key: "app"
                                  operator: "In"
                                  values: ["{{ .Globe.Name }}"]
                                },
                              ]
                            }
                          }
                        },
                      ]
                    }
                    {{- end}}
                    {{- end}}
                    {{- if .Necessary.nodeAffinity }}
                    {{- with .Necessary.nodeAffinity }}
                    nodeAffinity: {{ toCue . }}
                    {{- end }}
                  }
                  {{- end }}
                  {{- if eq (semverCompare ">= 1.19-0" .Capabilities.KubeVersion.Version) true }}
                  topologySpreadConstraints: [
                  {{- if ne .Necessary.podAntiAffinityTopologKey "kubernetes.io/hostname"}}
                    {
                      maxSkew: 1
                      topologyKey: "{{ .Necessary.podAntiAffinityTopologKey | default "" }}"
                      {{- if eq .Necessary.podAntiAffinity "hard"}}
                      whenUnsatisfiable: "DoNotSchedule"
                      {{- else if eq .Necessary.podAntiAffinity "soft"}}
                      whenUnsatisfiable: "ScheduleAnyway"
                      {{- end }}
                      labelSelector: {
                        matchExpressions: [
                          {
                            key: "app"
                            operator: "In"
                            values: ["{{ .Globe.Name }}"]
                          },
                          {
                            key: "component"
                            operator: "NotIn"
                            values: ["{{ .Globe.Name }}-sentinel","{{ .Globe.Name }}-predixy"]
                          },
                        ]
                      }
                    },
                  {{- end }}
                    {
                      maxSkew: 1
                      topologyKey: "kubernetes.io/hostname"
                      {{- if eq .Necessary.podAntiAffinity "hard"}}
                      whenUnsatisfiable: "DoNotSchedule"
                      {{- else if eq .Necessary.podAntiAffinity "soft"}}
                      whenUnsatisfiable: "ScheduleAnyway"
                      {{- end }}
                      labelSelector: {
                        matchExpressions: [
                          {
                            key: "app"
                            operator: "In"
                            values: ["{{ .Globe.Name }}"]
                          },
                          {
                            key: "component"
                            operator: "NotIn"
                            values: ["{{ .Globe.Name }}-sentinel","{{ .Globe.Name }}-predixy"]
                          },
                        ]
                      }
                    },
                  ]
                  {{- end}}
                },
              ]
            }
          }
          resource: {
            apiversion: "middleware.cn/v1"
            kind: "Middleware"
            name: "{{ .Globe.Name }}"
            namespace: "{{ .Globe.Namespace }}"
          }
        }

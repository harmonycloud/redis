apiVersion: middleware.cn/v1
kind: MiddlewareBaseline
metadata:
  name: redis-cluster
  labels:
    nephele/user: admin
  annotations:
    datapath: '{{ printf "/data/redis/cluster.local/%s/%s/{POD_NAME}/data" .Globe.Namespace .Globe.Name }}'
    baselineName: "集群模式"
    description: "集群模式基线,包含核心功能和必要依赖,适用于快速部署和基本应用场景,稳定可靠,易于扩展和维护."
spec:
  operatorBaseline:
    name: redis-operator-standard
    gvkName: v1alpha1
  necessary:
    repository: ""
    version: "7.2.8"
    resource:
      redis:
        limits:
          cpu: ""
          memory: ""
        requests:
          cpu: ""
          memory: ""
        replicas: "1"
        volume:
          size: ""
          storageClass: ""
  preActions:
    - name: pre-redis-logging
      parameters:
        fileLogging: true
        stdoutLogging: true
      fixed: false
      exposed: true
    - name: pre-redis-tolerations
      parameters:
        tolerations: [ ]
      fixed: false
      exposed: true
    - name: pre-redis-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: { }
      fixed: false
      exposed: true
  parameters:
    env:
      TZ: Asia/Shanghai
    type: cluster
    pod:
      - affinity:
        annotations:
          fixed-node-middleware-pod: "true"
          fixed.ipam.harmonycloud.cn: "true"
        configmap: "{{ .Globe.Name }}-config"
        env:
          - name: SYS_CODE
            value: redis
        labels:
          harmonycloud.cn/statefulset: "{{ .Globe.Name }}"
          middleware: redis
          nephele/user: admin
        middlewareImage: '{{ if eq .Parameters.version "5.0.8" }}redis-cli-v5-port:5.0.8-1.1.1{{ else if eq .Parameters.version "6.2.6" }}redis-cli-v6-port:6.2.6-1.2.0{{ else if eq .Parameters.version "6.2.11" }}redis-cli-v6-port:6.2.11-1.2.0{{ else if eq .Parameters.version "6.2.14" }}redis-cli-v6-port:6.2.14-1.2.0{{ else if eq .Parameters.version "6.2.16" }}redis-cli-v6-port:6.2.16-1.0.0{{ else if eq .Parameters.version "6.2.18" }}redis-cli-v6-port:6.2.18-1.0.0{{ else if eq .Parameters.version "7.0.12" }}redis-cli-v7-port:7.0.12-1.2.0{{ else if eq .Parameters.version "7.0.15" }}redis-cli-v7-port:7.0.15{{ else if eq .Parameters.version "7.2.4" }}redis-cli-v7-port:7.2.4-1.2.0{{ else if eq .Parameters.version "7.2.8" }}redis-cli-v7-port:7.2.8-1.0.0{{ end }}'
        initImage: "redis-init:v1.7.3"
        monitorImage: "redis-exporter:v1.0.5-1.0.0"
        logrotateImage: "logrotate:3.21.0-1.0.0"
        requirepass: "Hc@Cloud01"
        imagePullPolicy: IfNotPresent
        hostNetwork: false
        resources:
          limits:
            cpu: "{{ .Necessary.resource.redis.limits.cpu }}"
            memory: "{{ .Necessary.resource.redis.limits.memory }}"
          requests:
            cpu: "{{ .Necessary.resource.redis.requests.cpu }}"
            memory: "{{ .Necessary.resource.redis.requests.memory }}"
        updateStrategy: { }
        command: /bin/launch.sh
    exporter:
      port: 9121
      rdbScan: { }
      sentinelPort: 9121
    podManagementPolicy: Parallel
    replicas: "{{ .Necessary.resource.redis.replicas }}"
    servicePort: 6379
    repository: "{{ .Necessary.repository }}/"
    updateStrategy:
      type: AutoReceive
    version: "{{ .Necessary.version }}"
    volumeClaimTemplates:
      - metadata:
          name: redis-data
        spec:
          accessModes: [ "ReadWriteOnce" ]
          storageClassName: "{{ .Necessary.resource.redis.volume.storageClass }}"
          resources:
            requests:
              storage: "{{ .Necessary.resource.redis.volume.size }}"
  configurations:
    - name: redis-credential
      values:
        redis:
          port: "{{ (index .Parameters.pod 0).servicePort }}"
        redisPassword: "{{ (index .Parameters.pod 0).requirepass }}"
    - name: redis-predixy-servicemonitor
      values:
        predixy:
          enableProxy: "{{ if .Parameters.predixy }}true{{ else }}flase{{ end }}"
    - name: redis-alert-rule
      values:
        type: "{{ .Parameters.type }}"
        predixy:
          enableProxy: "{{ if .Parameters.predixy }}true{{ else }}flase{{ end }}"
    - name: redis-config
      values:
        type: "{{ .Parameters.type }}"
        version: "{{ .Parameters.version }}"
        customVolumes: { }
        additionArgs: { }
        args:
          maxmemory-policy: volatile-lru
          renameCommand:
            # - CONFIG ""
            # - SHUTDOWN ""
            - KEYS NOKEYS
            - FLUSHDB ""
            - FLUSHALL ""
    - name: redis-sc
      values:
        type: "{{ .Parameters.type }}"
        predixy:
          enableProxy: "{{ if .Parameters.predixy }}true{{ else }}flase{{ end }}"
    - name: redis-servicemonitor
    - name: redis-shard-sc
      values:
        type: "{{ .Parameters.type }}"
        predixy:
          enableProxy: "{{ if .Parameters.predixy }}true{{ else }}flase{{ end }}"
        redis:
          replicas: "{{ .Necessary.resource.redis.replicas }}"

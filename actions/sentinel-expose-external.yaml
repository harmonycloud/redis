apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: redis-sentinel-expose-external
  annotations:
    alias: "集群外访问"
spec:
  baselineType: "NormalAction"
  actionType: "expose"
  supportedBaselines:
    - "redis-sentinel"
  necessary:
    handleType: "create" # create、delete
    exposeType: "nodePort" # nodePort、traefik
    traefikName: ""
    host: "10.10.102.52" # nodeport主机地址
    ports: "" # 不固定，根据baseline提供的渲染
    sentinelPorts: "" # 不固定，根据baseline提供的渲染
    protocol: "TCP" # 协议
  steps:
    - name: initRollback
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 初始化回滚系统
            echo "Initializing rollback system..."

            # 创建临时文件来跟踪已创建的资源
            ROLLBACK_FILE="/tmp/rollback-{{ .Globe.MiddlewareName }}-{{ .Globe.Namespace }}.txt"
            echo "# Rollback tracking file for {{ .Globe.MiddlewareName }} in {{ .Globe.Namespace }}" > $ROLLBACK_FILE
            echo "# Created at $(date)" >> $ROLLBACK_FILE

            # 设置回滚函数
            rollback_all() {
              echo "=== ROLLBACK TRIGGERED ==="
              echo "Cleaning up all created resources..."
              
              if [ -f "$ROLLBACK_FILE" ]; then
                while IFS= read -r line; do
                  # 跳过注释行和空行
                  if [[ ! "$line" =~ ^#.*$ ]] && [[ -n "$line" ]]; then
                    echo "Rolling back: $line"
                    eval "$line"
                  fi
                done < "$ROLLBACK_FILE"
              fi
              
              # 清理临时文件
              rm -f "$ROLLBACK_FILE"
              echo "Rollback completed"
              exit 1
            }

            # 设置错误处理
            trap rollback_all ERR

            # 添加资源到回滚列表的函数
            add_to_rollback() {
              echo "$1" >> "$ROLLBACK_FILE"
            }

            echo "Rollback system initialized successfully"
            echo "Rollback file: $ROLLBACK_FILE"
    - name: getUid
      output:
        type: "string"
        expose: true
      cmd:
        command:
          - "kubectl"
          - "get"
          - "rec"
          - "-n"
          - "{{ .Globe.Namespace }}"
          - "{{ .Globe.MiddlewareName }}"
          - "-o"
          - "jsonpath='{.metadata.uid}'"
    - name: createNodePort
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            {{- range $index, $value := .Necessary.ports }}
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"
            PORT=$(kubectl get svc {{ $.Globe.MiddlewareName }}-{{ $index }}-pod -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].port}')
            TARGET_PORT=$(kubectl get svc {{ $.Globe.MiddlewareName }}-{{ $index }}-pod -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].targetPort}')
            SELECTOR_YAML=$(kubectl get svc {{ $.Globe.MiddlewareName }}-{{ $index }}-pod -n ${NAMESPACE} -o jsonpath='{.spec.selector}' | sed 's/{"//g; s/"}//g; s/":"/: "/g; s/","/\n    /g; s/^/    /' | sed 's/$/"/')

            {{- if eq $.Necessary.exposeType "nodePort" }}
            {{- if eq $.Necessary.handleType "create" }}
            kubectl apply -f - <<EOF > /dev/null 2>&1
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f - <<EOF > /dev/null 2>&1
            {{- end }}
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
            spec:
              ports:
                - name: {{ $.Globe.MiddlewareName }}
                  port: ${PORT}
                  protocol: ${PROTOCOL}
                  targetPort: ${TARGET_PORT}
                  nodePort: {{ $value }}
              selector:
            ${SELECTOR_YAML}
              type: NodePort
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            # 如果创建成功，添加到回滚列表
            if [ $? -eq 0 ]; then
              add_to_rollback "kubectl delete svc {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              echo "Created NodePort Service: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport (added to rollback list)"
            else
              echo "Failed to create NodePort Service: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport"
              exit 1
            fi
            {{- end }}
            {{- end }}
            {{- if eq $.Necessary.exposeType "traefik" }}
            {{- if eq $.Necessary.handleType "create" }}
            kubectl apply -f - <<EOF > /dev/null 2>&1
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f - <<EOF > /dev/null 2>&1
            {{- end }}
            apiVersion: traefik.containo.us/v1alpha1
            kind: IngressRouteTCP
            metadata:
              annotations:
                kubernetes.io/ingress.class: {{ $.Necessary.traefikName }}
              name: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport
              namespace: ${NAMESPACE}
            spec:
            entryPoints:
            - {{ $.Necessary.traefikName }}-p{{ $value }}
            routes:
            - match: HostSNI ('*')
            services:
            - name: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod
            port: ${PORT}
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            # 如果创建成功，添加到回滚列表
            if [ $? -eq 0 ]; then
              add_to_rollback "kubectl delete ingressroutetcp {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              echo "Created Traefik IngressRouteTCP: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport (added to rollback list)"
            else
              echo "Failed to create Traefik IngressRouteTCP: {{ $.Globe.MiddlewareName }}-{{ $index }}-pod-nodeport"
              exit 1
            fi
            {{- end }}
            {{- end }}
            {{- end }}
    - name: createSentinelNodePort
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            {{- range $index, $value := .Necessary.sentinelPorts }}
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"
            PORT=$(kubectl get svc {{ $.Globe.MiddlewareName }}-sentinel -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].port}')
            TARGET_PORT=$(kubectl get svc {{ $.Globe.MiddlewareName }}-sentinel -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].targetPort}')
            SELECTOR_YAML=$(kubectl get svc {{ $.Globe.MiddlewareName }}-sentinel -n ${NAMESPACE} -o jsonpath='{.spec.selector}' | sed 's/{"//g; s/"}//g; s/":"/: "/g; s/","/\n    /g; s/^/    /' | sed 's/$/"/')

            {{- if eq $.Necessary.exposeType "nodePort" }}
            {{- if eq $.Necessary.handleType "create" }}
            kubectl apply -f - <<EOF > /dev/null 2>&1
            {{- else if $.Necessary.handleType "delete" }}
            kubectl delete -f - <<EOF > /dev/null 2>&1
            {{- end }}
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ $.Globe.MiddlewareName }}-sentinel-nodeport
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
            spec:
              ports:
                - name: {{ $.Globe.MiddlewareName }}
                  port: ${PORT}
                  protocol: ${PROTOCOL}
                  targetPort: ${TARGET_PORT}
                  nodePort: {{ $value }}
              selector:
            ${SELECTOR_YAML}
              type: NodePort
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            # 如果创建成功，添加到回滚列表
            if [ $? -eq 0 ]; then
              add_to_rollback "kubectl delete svc {{ $.Globe.MiddlewareName }}-sentinel-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              echo "Created internal NodePort Service: {{ $.Globe.MiddlewareName }}-sentinel-nodeport (added to rollback list)"
            else
              echo "Failed to create internal NodePort Service: {{ $.Globe.MiddlewareName }}-sentinel-nodeport"
              exit 1
            fi
            {{- end }}
            {{- end }}
            {{- if eq $.Necessary.exposeType "traefik" }}
            {{- if eq $.Necessary.handleType "create" }}
            kubectl apply -f - <<EOF > /dev/null 2>&1
            {{- else if $.Necessary.handleType "delete" }}
            kubectl delete -f - <<EOF > /dev/null 2>&1
            {{- end }}
            apiVersion: traefik.containo.us/v1alpha1
            kind: IngressRouteTCP
            metadata:
              annotations:
                kubernetes.io/ingress.class: {{ $.Necessary.traefikName }}
              name: {{ $.Globe.MiddlewareName }}-sentinel-nodeport
              namespace: ${NAMESPACE}
            spec:
            entryPoints:
            - {{ $.Necessary.traefikName }}-p{{ $value }}
            routes:
            - match: HostSNI ('*')
            services:
            - name: {{ $.Globe.MiddlewareName }}-sentinel
            port: ${PORT}
            EOF
            {{- if eq $.Necessary.handleType "create" }}
            # 如果创建成功，添加到回滚列表
            if [ $? -eq 0 ]; then
              add_to_rollback "kubectl delete ingressroutetcp {{ $.Globe.MiddlewareName }}-sentinel-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              echo "Created internal Traefik IngressRouteTCP: {{ $.Globe.MiddlewareName }}-sentinel-nodeport (added to rollback list)"
            else
              echo "Failed to create internal Traefik IngressRouteTCP: {{ $.Globe.MiddlewareName }}-sentinel-nodeport"
              exit 1
            fi
            {{- end }}
            {{- end }}
            {{- end }}
    - name: cleanupRollback
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 所有步骤成功完成，清理回滚文件
            ROLLBACK_FILE="/tmp/rollback-{{ .Globe.MiddlewareName }}-{{ .Globe.Namespace }}.txt"

            if [ -f "$ROLLBACK_FILE" ]; then
              echo "All operations completed successfully. Cleaning up rollback file..."
              rm -f "$ROLLBACK_FILE"
              echo "Rollback file cleaned up: $ROLLBACK_FILE"
            else
              echo "No rollback file found to clean up"
            fi

            echo "Operation completed successfully!"
    - name: updateMiddleware
      cmd:
        command:
          - |
            NECESSARY_JSON=$(kubectl get mid {{ .Globe.MiddlewareName }} -n {{ .Globe.Namespace }} -o jsonpath='{.metadata.annotations.middleware\.cn/exposeNecessary}' | base64 -d)
            if [ -z "$NECESSARY_JSON" ]; then
              NECESSARY_JSON='{}'
            fi

            {{- if eq .Necessary.handleType "create" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-sentinel-expose-external" = {{ toJson .Necessary }}')
            {{- else if eq .Necessary.handleType "delete" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-sentinel-expose-external" = null')
            {{- end }}
            NECESSARY_JSON_BASE64=$(echo $NECESSARY_JSON | base64 -w 0)
            kubectl annotate mid {{ .Globe.MiddlewareName }} middleware.cn/exposeNecessary=$NECESSARY_JSON_BASE64 -n {{ .Globe.Namespace }}
    - name: updateCluster
      type: "KubectlEdit" # KubectlGet、KubectlEdit、KubectlExec、Exec、HTTP
      cue: |
        output: {
          spec: parameters.spec
        }
        parameters: {
          spec: {
            parameters: {
              pod: [
                {
                  externalAccess: {
                    {{- if eq .Necessary.handleType "create" }}
                    enabled: true
                    {{- else if eq .Necessary.handleType "delete" }}
                    enabled: false
                    {{- end }}
                    addresses: {
                      {{- if eq .Necessary.handleType "create" }}
                      {{- range $index, $value := .Necessary.ports }}
                      "{{ $.Globe.MiddlewareName }}-sentinel-{{ $index }}": "{{ $.Necessary.host }}:{{ $value }}"
                      {{- end }}
                      {{- end }}
                    }
                    sentinelAddresses: {
                      {{- if eq .Necessary.handleType "create" }}
                      {{- range $index, $value := .Necessary.sentinelPorts }}
                      "{{ $.Globe.MiddlewareName }}-sentinel-{{ $index }}": {{ $value }}
                      {{- end }}
                      {{- end }}
                    }
                  }
                },
              ]
            }
          }
          resource: {
            apiversion: "middleware.cn/v1"
            kind: "Middleware"
            name: "{{ .Globe.MiddlewareName }}"
            namespace: "{{ .Globe.Namespace }}"
          }
        }

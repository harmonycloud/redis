apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: redis-proxy-expose
  annotations:
    alias: "服务暴露-读写分离"
spec:
  baselineType: "NormalAction"
  actionType: "expose"
  supportedBaselines:
    - "redis-sentinel-proxy"
    - "redis-cluster-proxy"
    - "redis-sentinel-proxy-active"
  necessary:
    handleType: '{"type":"enum","label":"handleType","required":true,"options":"create,update,delete","visible": true}' # create、delete
    exposeType: '{"type":"enum","label":"exposeType","required":true,"options":"NodePort,Ingress","visible": true}' # nodePort、traefik
    traefikName: '{"type":"string","label":"负载均衡控制器名称","required":true,"visible": true}'
    ports: '{"type":"expose","label":"Redis节点端口","required":true,"size":"1","visible": true,"placeholder":"请输入端口号，点击回车进行添加","pattern":"^[1-9]\\d*$","description":"请输入合法端口号", "update": true}'# 不固定，根据baseline提供的渲染
    protocol: '{"type":"enum","label":"协议","required":true,"options":"TCP","visible": true}' # 协议
  steps:
    - name: initRollback
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 创建回滚脚本文件，包含所有回滚相关的函数
            cat > /tmp/rollback-functions.sh << 'ROLLBACK_EOF'
            
            # 回滚文件路径
            ROLLBACK_FILE="/tmp/rollback-{{ .Globe.MiddlewareName }}-{{ .Globe.Namespace }}.txt"
            
            # 初始化回滚系统
            init_rollback() {
              echo "Initializing rollback system..."
              echo "# Rollback tracking file for {{ .Globe.MiddlewareName }} in {{ .Globe.Namespace }}" > "$ROLLBACK_FILE"
              echo "# Created at $(date)" >> "$ROLLBACK_FILE"
              echo "Rollback system initialized successfully"
              echo "Rollback file: $ROLLBACK_FILE"
            }
            
            # 添加资源到回滚列表的函数
            add_to_rollback() {
              echo "$1" >> "$ROLLBACK_FILE"
            }
            
            # 执行回滚
            execute_rollback() {
              echo "=== ROLLBACK TRIGGERED ==="
              echo "Cleaning up all created resources..."
            
              if [ -f "$ROLLBACK_FILE" ]; then
                while IFS= read -r line; do
                  # 跳过注释行和空行
                  if [[ ! "$line" =~ ^#.*$ ]] && [[ -n "$line" ]]; then
                    echo "Rolling back: $line"
                    eval "$line" || echo "Failed to rollback: $line"
                  fi
                done < "$ROLLBACK_FILE"
              fi
            
              echo "Rollback completed"
              rm -f "$ROLLBACK_FILE"
            }
            
            # 清理回滚文件（成功时）
            cleanup_rollback() {
              echo "Script completed successfully, cleaning up rollback file"
              rm -f "$ROLLBACK_FILE"
            }
            ROLLBACK_EOF
            
            # 设置执行权限
            chmod +x /tmp/rollback-functions.sh
            
            # 初始化回滚系统
            source /tmp/rollback-functions.sh
            init_rollback
            
            # 设置错误处理和回滚trap
            set -e
            trap execute_rollback EXIT
            
            echo "Rollback system initialized successfully"
            echo "Rollback file: $ROLLBACK_FILE"
    - name: updateMiddleware
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh
            
            NECESSARY_JSON=$(kubectl get mid {{ .Globe.MiddlewareName }} -n {{ .Globe.Namespace }} -o jsonpath='{.metadata.annotations.middleware\.cn/exposeNecessary}' | base64 -d)
            if [ -z "$NECESSARY_JSON" ]; then
              NECESSARY_JSON='{}'
            fi

            {{- if or (eq .Necessary.handleType "create") (eq .Necessary.handleType "update") }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-proxy-expose" = {{ toJson .Necessary }}')
            {{- else if eq .Necessary.handleType "delete" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-proxy-expose" = null')
            {{- end }}
            NECESSARY_JSON_BASE64=$(echo $NECESSARY_JSON | base64 -w 0)
            kubectl annotate mid {{ .Globe.MiddlewareName }} middleware.cn/exposeNecessary=$NECESSARY_JSON_BASE64 -n {{ .Globe.Namespace }} --overwrite=true
            {{- if eq .Necessary.handleType "create" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-proxy-expose" = null')
            {{- else if eq .Necessary.handleType "update" }}
            NECESSARY_JSON=$(kubectl get mid {{ .Globe.MiddlewareName }} -n {{ .Globe.Namespace }} -o jsonpath='{.metadata.annotations.middleware\.cn/exposeNecessary}' | base64 -d)
            {{- end }}
            NECESSARY_JSON_BASE64=$(echo $NECESSARY_JSON | base64 -w 0)
            add_to_rollback "kubectl annotate mid {{ .Globe.MiddlewareName }} middleware.cn/exposeNecessary=$NECESSARY_JSON_BASE64 -n {{ .Globe.Namespace }} --overwrite=true"
    - name: getUid
      output:
        type: "string"
        expose: true
      cmd:
        command:
          - "kubectl"
          - "get"
          - "rec"
          - "-n"
          - "{{ .Globe.Namespace }}"
          - "{{ .Globe.MiddlewareName }}"
          - "-o"
          - "jsonpath='{.metadata.uid}'"
    - name: createNodePort
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh
            
            {{- range $index, $value := .Necessary.ports }}
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"
            PORT=$(kubectl get svc {{ $.Globe.MiddlewareName }}-predixy -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].port}')
            TARGET_PORT=$(kubectl get svc {{ $.Globe.MiddlewareName }}-predixy -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].targetPort}')
            SELECTOR_YAML=$(kubectl get svc {{ $.Globe.MiddlewareName }}-predixy -n ${NAMESPACE} -o jsonpath='{.spec.selector}' | sed 's/{"//g; s/"}//g; s/":"/: "/g; s/","/\n    /g; s/^/    /' | sed 's/$/"/')

            {{- if eq $.Necessary.exposeType "NodePort" }}
            cat > /tmp/nodeport-service-${MIDDLEWARE_NAME}-predixy-nodeport.yaml << EOF
            apiVersion: v1
            kind: Service
            metadata:
              name: ${MIDDLEWARE_NAME}-predixy-nodeport
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
              labels:
                middleware.cn/source: "actionbaseline"
                middleware.cn/sourcename: "redis-proxy-expose"
            spec:
              ports:
                - name: ${MIDDLEWARE_NAME}
                  port: ${PORT}
                  protocol: ${PROTOCOL}
                  targetPort: ${TARGET_PORT}
                  nodePort: {{ $value }}
              selector:
            ${SELECTOR_YAML}
              type: NodePort
            EOF

            {{- if or (eq $.Necessary.handleType "create") (eq $.Necessary.handleType "update") }}
            ERROR_OUTPUT=$(kubectl apply -f /tmp/nodeport-service-${MIDDLEWARE_NAME}-predixy-nodeport.yaml 2>&1)
            EXIT_CODE=$?
            if echo "$ERROR_OUTPUT" | grep -q "provided port is already allocated"; then
              echo "Port {{ $value }} is already allocated for ${MIDDLEWARE_NAME}-predixy-nodeport, skipping service creation"
              execute_rollback
              exit 1
            else
              # 如果创建成功，添加到回滚列表
              if [ $EXIT_CODE -eq 0 ]; then
                add_to_rollback "kubectl delete svc ${MIDDLEWARE_NAME}-predixy-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              else
                echo "Failed to create NodePort Service: ${MIDDLEWARE_NAME}-predixy-nodeport"
                echo "$ERROR_OUTPUT"
                execute_rollback
                exit 1
              fi
            fi
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f /tmp/nodeport-service-${MIDDLEWARE_NAME}-predixy-nodeport.yaml > /dev/null 2>&1
            echo "Deleted NodePort Service: ${MIDDLEWARE_NAME}-predixy-nodeport"
            {{- end }}
            # 清理临时文件
            rm -f /tmp/nodeport-service-${MIDDLEWARE_NAME}-predixy-nodeport.yaml
            {{- end }}

            {{- if eq $.Necessary.exposeType "Ingress" }}
            cat > /tmp/traefik-ingress-${MIDDLEWARE_NAME}-predixy-nodeport.yaml << EOF
            apiVersion: traefik.containo.us/v1alpha1
            kind: IngressRouteTCP
            metadata:
              annotations:
                kubernetes.io/ingress.class: {{ $.Necessary.traefikName }}
              name: ${MIDDLEWARE_NAME}-predixy-nodeport
              namespace: ${NAMESPACE}
              labels:
                middleware.cn/source: "actionbaseline"
                middleware.cn/sourcename: "redis-proxy-expose"
            spec:
              entryPoints:
              - {{ $.Necessary.traefikName }}-p{{ $value }}
              routes:
              - match: HostSNI (\`*\`)
                services:
                - name: ${MIDDLEWARE_NAME}-predixy
                  port: ${PORT}
            EOF

            {{- if or (eq $.Necessary.handleType "create") (eq $.Necessary.handleType "update") }}
            ERROR_OUTPUT=$(kubectl apply -f /tmp/traefik-ingress-${MIDDLEWARE_NAME}-predixy-nodeport.yaml 2>&1)
            EXIT_CODE=$?
            # 如果创建成功，添加到回滚列表
            if [ $EXIT_CODE -eq 0 ]; then
              kubectl label svc {{ $.Globe.MiddlewareName }}-predixy -n ${NAMESPACE} middleware.cn/source="actionbaseline" middleware.cn/sourcename="redis-proxy-expose" --overwrite
              add_to_rollback "kubectl delete ingressroutetcp ${MIDDLEWARE_NAME}-predixy-nodeport -n ${NAMESPACE} --ignore-not-found=true"
            else
              echo "Failed to create Traefik IngressRouteTCP: ${MIDDLEWARE_NAME}-predixy-nodeport"
              echo "$ERROR_OUTPUT"
              execute_rollback
              exit 1
            fi
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl label svc {{ $.Globe.MiddlewareName }}-predixy -n ${NAMESPACE} middleware.cn/source- middleware.cn/sourcename-
            kubectl delete -f /tmp/traefik-ingress-${MIDDLEWARE_NAME}-predixy-nodeport.yaml > /dev/null 2>&1
            echo "Deleted Traefik IngressRouteTCP: ${MIDDLEWARE_NAME}-predixy-nodeport"
            {{- end }}
            # 清理临时文件
            rm -f /tmp/traefik-ingress-${MIDDLEWARE_NAME}-predixy-nodeport.yaml
            {{- end }}
            {{- end }}
    - name: cleanupRollback
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh
            
            # 所有步骤成功完成，清理回滚文件
            cleanup_rollback
            echo "Operation completed successfully!"

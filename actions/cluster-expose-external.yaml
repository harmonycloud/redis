apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: redis-cluster-expose-external
  annotations:
    alias: "集群外访问"
spec:
  baselineType: "NormalAction"
  actionType: "expose"
  supportedBaselines:
    - "redis-cluster"
  necessary:
    handleType: '{"type":"enum","label":"handleType","required":true,"options":"create,delete","visible": true}' # create、delete
    exposeType: '{"type":"enum","label":"exposeType","required":true,"options":"NodePort,Ingress-TCP","visible": true}' # nodePort、 traefik
    traefikName: '{"type":"string","label":"负载均衡控制器名称","required":true,"visible": true}'
    host: '{"type":"string","label":"负载均衡地址","required":true,"visible": false}' # nodeport主机地址
    ports: '{"type":"expose","label":"ports","required":true,"ref":"master*1,slave*1,","size":"1","visible": true,"placeholder":"请输入端口号，点击回车进行添加","pattern":"^[1-9]\\d*$","description":"请输入合法端口号"}' # 不固定，根据baseline提供的渲染
    busPorts: '{"type":"expose","label":"busPorts","required":true,"ref":"master*1,slave*1,","size":"1","visible": true,"placeholder":"请输入端口号,点击回车进行添加","pattern":"^[1-9]\\d*$","description":"请输入合法端口号"}' # 不固定，根据baseline提供的渲染
    protocol: '{"type":"enum","label":"协议","required":true,"options":"TCP","visible": true}' # 协议
  steps:
    - name: initRollback
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 创建回滚脚本文件，包含所有回滚相关的函数
            cat > /tmp/rollback-functions.sh << 'ROLLBACK_EOF'

            # 回滚文件路径
            ROLLBACK_FILE="/tmp/rollback-{{ .Globe.MiddlewareName }}-{{ .Globe.Namespace }}.txt"

            # 初始化回滚系统
            init_rollback() {
              echo "Initializing rollback system..."
              echo "# Rollback tracking file for {{ .Globe.MiddlewareName }} in {{ .Globe.Namespace }}" > "$ROLLBACK_FILE"
              echo "# Created at $(date)" >> "$ROLLBACK_FILE"
              echo "Rollback system initialized successfully"
              echo "Rollback file: $ROLLBACK_FILE"
            }

            # 添加资源到回滚列表的函数
            add_to_rollback() {
              echo "$1" >> "$ROLLBACK_FILE"
            }

            # 执行回滚
            execute_rollback() {
              echo "=== ROLLBACK TRIGGERED ==="
              echo "Cleaning up all created resources..."

              if [ -f "$ROLLBACK_FILE" ]; then
                while IFS= read -r line; do
                  # 跳过注释行和空行
                  if [[ ! "$line" =~ ^#.*$ ]] && [[ -n "$line" ]]; then
                    echo "Rolling back: $line"
                    eval "$line" || echo "Failed to rollback: $line"
                  fi
                done < "$ROLLBACK_FILE"
              fi

              echo "Rollback completed"
              rm -f "$ROLLBACK_FILE"
            }

            # 清理回滚文件（成功时）
            cleanup_rollback() {
              echo "Script completed successfully, cleaning up rollback file"
              rm -f "$ROLLBACK_FILE"
            }
            ROLLBACK_EOF

            # 设置执行权限
            chmod +x /tmp/rollback-functions.sh

            # 初始化回滚系统
            source /tmp/rollback-functions.sh
            init_rollback

            # 设置错误处理和回滚trap
            set -e
            trap execute_rollback EXIT

            echo "Rollback system initialized successfully"
            echo "Rollback file: $ROLLBACK_FILE"
    - name: updateMiddleware
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh
            
            NECESSARY_JSON=$(kubectl get mid {{ .Globe.MiddlewareName }} -n {{ .Globe.Namespace }} -o jsonpath='{.metadata.annotations.middleware\.cn/exposeNecessary}' | base64 -d)
            if [ -z "$NECESSARY_JSON" ]; then
              NECESSARY_JSON='{}'
            fi

            {{- if eq .Necessary.handleType "create" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-cluster-expose-external" = {{ toJson .Necessary }}')
            {{- else if eq .Necessary.handleType "delete" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-cluster-expose-external" = null')
            {{- end }}
            NECESSARY_JSON_BASE64=$(echo $NECESSARY_JSON | base64 -w 0)
            kubectl annotate mid {{ .Globe.MiddlewareName }} middleware.cn/exposeNecessary=$NECESSARY_JSON_BASE64 -n {{ .Globe.Namespace }} --overwrite=true
            {{- if eq .Necessary.handleType "create" }}
            NECESSARY_JSON=$(echo $NECESSARY_JSON | jq '."redis-cluster-expose-external" = null')
            {{- else if eq .Necessary.handleType "update" }}
            NECESSARY_JSON=$(kubectl get mid {{ .Globe.MiddlewareName }} -n {{ .Globe.Namespace }} -o jsonpath='{.metadata.annotations.middleware\.cn/exposeNecessary}' | base64 -d)
            {{- end }}
            NECESSARY_JSON_BASE64=$(echo $NECESSARY_JSON | base64 -w 0)
            add_to_rollback "kubectl annotate mid {{ .Globe.MiddlewareName }} middleware.cn/exposeNecessary=$NECESSARY_JSON_BASE64 -n {{ .Globe.Namespace }} --overwrite=true"
    - name: getUid
      output:
        type: "string"
        expose: true
      cmd:
        command:
          - "kubectl"
          - "get"
          - "rec"
          - "-n"
          - "{{ .Globe.Namespace }}"
          - "{{ .Globe.MiddlewareName }}"
          - "-o"
          - "jsonpath='{.metadata.uid}'"
    - name: createClusterIP
      output:
        type: "string"
        expose: true
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh

            {{- range $index, $value := .Necessary.ports }}
            POD_NAME="{{ $.Globe.MiddlewareName }}-{{ $index }}"
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"

            {{- if eq $.Necessary.handleType "create" }}
            kubectl apply -f - <<EOF > /dev/null 2>&1
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f - <<EOF > /dev/null 2>&1
            {{- end }}
            apiVersion: v1
            kind: Service
            metadata:
              name: ${POD_NAME}-pod
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
              labels:
                middleware.cn/source: "actionbaseline"
                middleware.cn/sourcename: "redis-cluster-expose-external"
            spec:
              ports:
                - name: redis
                  port: 6379
                  protocol: ${PROTOCOL}
                  targetPort: 6379
              selector:
                app: ${MIDDLEWARE_NAME}
                component: ${MIDDLEWARE_NAME}
                middleware: redis
                statefulset.kubernetes.io/pod-name: ${POD_NAME}
              type: ClusterIP
            EOF
            {{- if eq $.Necessary.handleType "create" }}
            # 如果创建成功，添加到回滚列表
            if [ $? -eq 0 ]; then
              add_to_rollback "kubectl delete svc ${POD_NAME}-pod -n ${NAMESPACE} --ignore-not-found=true"
            else
              echo "Failed to create ClusterIP Service: ${POD_NAME}-pod"
              echo "$ERROR_OUTPUT"
              execute_rollback
              exit 1
            fi
            {{- end }}
            {{- end }}
    - name: createInternalClusterIP
      output:
        type: "string"
        expose: true
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh

            {{- range $index, $value := .Necessary.busPorts }}
            POD_NAME="{{ $.Globe.MiddlewareName }}-{{ $index }}"
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"
            SERVICE_VALUE="{{ $value }}"

            {{- if eq $.Necessary.handleType "create" }}
            kubectl apply -f - <<EOF > /dev/null 2>&1
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f - <<EOF > /dev/null 2>&1
            {{- end }}
            apiVersion: v1
            kind: Service
            metadata:
              name: ${POD_NAME}-pod-16379
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
              labels:
                middleware.cn/source: "actionbaseline"
                middleware.cn/sourcename: "redis-cluster-expose-external"
            spec:
              ports:
                - name: redis
                  port: 16379
                  protocol: ${PROTOCOL}
                  targetPort: 16379
              selector:
                app: ${MIDDLEWARE_NAME}
                component: ${MIDDLEWARE_NAME}
                middleware: redis
                statefulset.kubernetes.io/pod-name: ${POD_NAME}
              type: ClusterIP
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            # 如果创建成功，添加到回滚列表
            if [ $? -eq 0 ]; then
              add_to_rollback "kubectl delete svc ${POD_NAME}-pod-16379 -n ${NAMESPACE} --ignore-not-found=true"
            else
              echo "Failed to create internal ClusterIP Service: ${POD_NAME}-pod-16379"
              echo "$ERROR_OUTPUT"
              execute_rollback
              exit 1
            fi
            {{- end }}
            {{- end }}
    - name: createNodePort
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh

            {{- range $index, $value := .Necessary.ports }}
            POD_NAME="{{ $.Globe.MiddlewareName }}-{{ $index }}"
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"
            PORT=$(kubectl get svc ${POD_NAME}-pod -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].port}')
            TARGET_PORT=$(kubectl get svc ${POD_NAME}-pod -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].targetPort}')

            {{- if eq $.Necessary.exposeType "NodePort" }}
            # 创建NodePort Service的YAML内容
            cat > /tmp/nodeport-service-${POD_NAME}.yaml << EOF
            apiVersion: v1
            kind: Service
            metadata:
              name: ${POD_NAME}-pod-nodeport
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
              labels:
                middleware.cn/source: "actionbaseline"
                middleware.cn/sourcename: "redis-cluster-expose-external"
            spec:
              ports:
                - name: redis
                  port: ${PORT}
                  protocol: ${PROTOCOL}
                  targetPort: ${TARGET_PORT}
                  nodePort: {{ $value }}
              selector:
                app: ${MIDDLEWARE_NAME}
                component: ${MIDDLEWARE_NAME}
                middleware: redis
                statefulset.kubernetes.io/pod-name: ${POD_NAME}
              type: NodePort
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            ERROR_OUTPUT=$(kubectl apply -f /tmp/nodeport-service-${POD_NAME}.yaml 2>&1)
            EXIT_CODE=$?
            # 检查端口冲突
            if echo "$ERROR_OUTPUT" | grep -q "provided port is already allocated"; then
              echo "Port {{ $value }} is already allocated for ${POD_NAME}, skipping service creation"
              execute_rollback
              exit 1
            else
              # 检查是否成功
              if [ $EXIT_CODE -eq 0 ]; then
                add_to_rollback "kubectl delete svc ${POD_NAME}-pod-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              else
                echo "Failed to create NodePort Service: ${POD_NAME}-pod-nodeport"
                echo "$ERROR_OUTPUT"
                execute_rollback
                exit 1
              fi
            fi
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f /tmp/nodeport-service-${POD_NAME}.yaml > /dev/null 2>&1
            echo "Deleted NodePort Service: ${POD_NAME}-pod-nodeport"
            {{- end }}
            # 清理临时文件
            rm -f /tmp/nodeport-service-${POD_NAME}.yaml
            {{- end }}

            {{- if eq $.Necessary.exposeType "Ingress-TCP" }}
            # 创建Traefik IngressRouteTCP的YAML内容
            cat > /tmp/traefik-ingress-${POD_NAME}.yaml << EOF
            apiVersion: traefik.containo.us/v1alpha1
            kind: IngressRouteTCP
            metadata:
              annotations:
                kubernetes.io/ingress.class: {{ $.Necessary.traefikName }}
              name: ${POD_NAME}-pod-nodeport
              namespace: ${NAMESPACE}
            spec:
              entryPoints:
              - {{ $.Necessary.traefikName }}-p{{ $value }}
              routes:
              - match: HostSNI (\`*\`)
                services:
                - name: ${POD_NAME}-pod
                  port: ${PORT}
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            ERROR_OUTPUT=$(kubectl apply -f /tmp/traefik-ingress-${POD_NAME}.yaml 2>&1)
            EXIT_CODE=$?
            # 如果创建成功，添加到回滚列表
            if [ $EXIT_CODE -eq 0 ]; then
              add_to_rollback "kubectl delete ingressroutetcp ${POD_NAME}-pod-nodeport -n ${NAMESPACE} --ignore-not-found=true"
            else
              echo "Failed to create Traefik IngressRouteTCP: ${POD_NAME}-pod-nodeport"
              echo "$ERROR_OUTPUT"
              execute_rollback
              exit 1
            fi
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f /tmp/traefik-ingress-${POD_NAME}.yaml > /dev/null 2>&1
            echo "Deleted Traefik IngressRouteTCP: ${POD_NAME}-pod-nodeport"
            {{- end }}
            # 清理临时文件
            rm -f /tmp/traefik-ingress-${POD_NAME}.yaml
            {{- end }}
            {{- end }}
    - name: createInternalNodePort
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh

            {{- range $index, $value := .Necessary.busPorts }}
            POD_NAME="{{ $.Globe.MiddlewareName }}-{{ $index }}"
            NAMESPACE="{{ $.Globe.Namespace }}"
            MIDDLEWARE_NAME="{{ $.Globe.MiddlewareName }}"
            CLUSTER_UID="{{ $.Step.getUid.output }}"
            PROTOCOL="{{ $.Necessary.protocol }}"
            PORT=$(kubectl get svc ${POD_NAME}-pod-16379 -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].port}')
            TARGET_PORT=$(kubectl get svc ${POD_NAME}-pod-16379 -n ${NAMESPACE} -o jsonpath='{.spec.ports[0].targetPort}')

            {{- if eq $.Necessary.exposeType "NodePort" }}
            # 创建内部NodePort Service的YAML内容
            cat > /tmp/internal-nodeport-service-${POD_NAME}.yaml << EOF
            apiVersion: v1
            kind: Service
            metadata:
              name: ${POD_NAME}-pod-16379-nodeport
              namespace: ${NAMESPACE}
              ownerReferences:
                - apiVersion: redis.middleware.hc.cn/v1alpha1
                  blockOwnerDeletion: false
                  controller: true
                  kind: RedisCluster
                  name: ${MIDDLEWARE_NAME}
                  uid: ${CLUSTER_UID}
              labels:
                middleware.cn/source: "actionbaseline"
                middleware.cn/sourcename: "redis-cluster-expose-external"
            spec:
              ports:
                - name: redis
                  port: ${PORT}
                  protocol: ${PROTOCOL}
                  targetPort: ${TARGET_PORT}
                  nodePort: {{ $value }}
              selector:
                app: ${MIDDLEWARE_NAME}
                component: ${MIDDLEWARE_NAME}
                middleware: redis
                statefulset.kubernetes.io/pod-name: ${POD_NAME}
              type: NodePort
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            ERROR_OUTPUT=$(kubectl apply -f /tmp/internal-nodeport-service-${POD_NAME}.yaml 2>&1)
            EXIT_CODE=$?
            # 检查端口冲突
            if echo "$ERROR_OUTPUT" | grep -q "provided port is already allocated"; then
              echo "Port {{ $value }} is already allocated for ${POD_NAME}, skipping service creation"
              execute_rollback
              exit 1
            else
              # 检查是否成功
              if [ $EXIT_CODE -eq 0 ]; then
                add_to_rollback "kubectl delete svc ${POD_NAME}-pod-16379-nodeport -n ${NAMESPACE} --ignore-not-found=true"
              else
                echo "Failed to create internal NodePort Service: ${POD_NAME}-pod-16379-nodeport"
                echo "$ERROR_OUTPUT"
                execute_rollback
                exit 1
              fi
            fi
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f /tmp/internal-nodeport-service-${POD_NAME}.yaml > /dev/null 2>&1
            echo "Deleted internal NodePort Service: ${POD_NAME}-pod-16379-nodeport"
            {{- end }}
            # 清理临时文件
            rm -f /tmp/internal-nodeport-service-${POD_NAME}.yaml
            {{- end }}

            {{- if eq $.Necessary.exposeType "Ingress-TCP" }}
            # 创建内部Traefik IngressRouteTCP的YAML内容
            cat > /tmp/internal-traefik-ingress-${POD_NAME}.yaml << EOF
            apiVersion: traefik.containo.us/v1alpha1
            kind: IngressRouteTCP
            metadata:
              annotations:
                kubernetes.io/ingress.class: {{ $.Necessary.traefikName }}
              name: ${POD_NAME}-pod-16379-nodeport
              namespace: ${NAMESPACE}
            spec:
              entryPoints:
              - {{ $.Necessary.traefikName }}-p{{ $value }}
              routes:
              - match: HostSNI (\`*\`)
                services:
                - name: ${POD_NAME}-pod-16379
                  port: ${PORT}
            EOF

            {{- if eq $.Necessary.handleType "create" }}
            ERROR_OUTPUT=$(kubectl apply -f /tmp/internal-traefik-ingress-${POD_NAME}.yaml 2>&1)
            EXIT_CODE=$?
            # 如果创建成功，添加到回滚列表
            if [ $EXIT_CODE -eq 0 ]; then
              add_to_rollback "kubectl delete ingressroutetcp ${POD_NAME}-pod-16379-nodeport -n ${NAMESPACE} --ignore-not-found=true"
            else
              echo "Failed to create internal Traefik IngressRouteTCP: ${POD_NAME}-pod-16379-nodeport"
              echo "$ERROR_OUTPUT"
              execute_rollback
              exit 1
            fi
            {{- else if eq $.Necessary.handleType "delete" }}
            kubectl delete -f /tmp/internal-traefik-ingress-${POD_NAME}.yaml > /dev/null 2>&1
            echo "Deleted internal Traefik IngressRouteTCP: ${POD_NAME}-pod-16379-nodeport"
            {{- end }}
            # 清理临时文件
            rm -f /tmp/internal-traefik-ingress-${POD_NAME}.yaml
            {{- end }}
            {{- end }}
    - name: cleanupRollback
      output:
        type: "string"
        expose: false
      cmd:
        command:
          - |
            # 加载回滚函数
            source /tmp/rollback-functions.sh

            # 所有步骤成功完成，清理回滚文件
            cleanup_rollback
            echo "Operation completed successfully!"
    - name: updateCluster
      type: "KubectlEdit" # KubectlGet、KubectlEdit、KubectlExec、Exec、HTTP
      cue: |
        output: {
          spec: parameters.spec
        }
        parameters: {
          spec: {
            parameters: {
              pod: [
                {
                  externalAccess: {
                    {{- if eq .Necessary.handleType "create" }}
                    enabled: true
                    {{- else if eq .Necessary.handleType "delete" }}
                    enabled: false
                    {{- end }}
                    addresses: {
                      {{- if eq .Necessary.handleType "create" }}
                      {{- range $index, $value := .Necessary.ports }}
                      "{{ $.Globe.MiddlewareName }}-{{ $index }}": "{{ $.Necessary.host }}:{{ $value }}"
                      {{- end }}
                      {{- end }}
                    }
                    busPorts: {
                      {{- if eq .Necessary.handleType "create" }}
                      {{- range $index, $value := .Necessary.busPorts }}
                      "{{ $.Globe.MiddlewareName }}-{{ $index }}": {{ $value }}
                      {{- end }}
                      {{- end }}
                    }
                  }
                },
              ]
            }
          }
          resource: {
            apiversion: "middleware.cn/v1"
            kind: "Middleware"
            name: "{{ .Globe.MiddlewareName }}"
            namespace: "{{ .Globe.Namespace }}"
          }
        }

apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: redis-scale
  annotations:
    alias: "Instance Scaling"
spec:
  baselineType: "NormalAction"
  actionType: "scale"
  necessary: {}
  steps:
    - name: isExposed
      output:
        type: "string"
        expose: true
      cmd:
        command:
          - |
            {{- if or (eq .Necessary.scaleType "vertical") (eq .Necessary.role "sentinel") }}
            echo "false"
            {{- else }}
            # 判断 annotations 中是否存在 middleware.cn/exposeNecessary 字段
            output=$(kubectl get mid -n {{ .Globe.Namespace }} {{ .Globe.MiddlewareName }} -o jsonpath='{.metadata.annotations.middleware\.cn/exposeNecessary}' | base64 -d | grep exposeType)
            if [ -z "$output" ]; then
              echo "false"
            else
              echo "true"
            fi
            {{- end }}
    - name: scale
      cmd:
        command:
          - |
            # 判断是否已经暴露
            if [ "{{ .Step.isExposed.output }}" == "true" ]; then
              echo "Service exposure detected. Horizontal scaling is currently unavailable. Please delete and retry."
              exit 1
            else
              echo "not exposed"
              kubectl patch mid {{ .Globe.MiddlewareName }} -n {{ .Globe.Namespace }} --type=merge -p '{"spec":{"necessary":{"resource":{{ toJson .Necessary.resource }}}}}'
            fi
apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: crd-redisshakes
spec:
  template: |
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: redisshakes.redis.middleware.hc.cn
      annotations:
        harmonycloud-middleware-status-phase: 'if .metadata.annotations."middleware.maintenance.lock"=="middlewarebackup" then . + {status: (.status +  {"phase": "Recover"})} else if .metadata.annotations."middleware.maintenance.lock"=="graceful-restart" then . + {status: (.status +  {"phase": "GracefulRestart"})} else . end end'
        harmonycloud-middleware-status-process: '. + {status: (.status +  {"process": .metadata.annotations."middleware.maintenance.phase"})}'
        harmonycloud-middleware-status-log: '. + {status: (.status +  {"reason": .metadata.annotations."middleware.maintenance.log"})}'
      creationTimestamp:
    spec:
      group: redis.middleware.hc.cn
      names:
        plural: redisshakes
        singular: redisshake
        shortNames:
        - res
        kind: RedisShake
        listKind: RedisShakeList
        categories:
        - all
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        subresources:
          status: {}
          scale:
            specReplicasPath: ".spec.replicas"
            statusReplicasPath: ".status.replicas"
            labelSelectorPath: ".status.labelSelector"
        additionalPrinterColumns:
        - name: STATUS
          type: string
          description: The status of the this redisCluster
          jsonPath: ".status.phase"
        - name: AGE
          type: date
          jsonPath: ".metadata.creationTimestamp"
    status:
      conditions:
      acceptedNames:
        plural: ''
        kind: ''
      storedVersions:
      - v1alpha1

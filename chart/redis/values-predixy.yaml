redisPassword: dangerous

image:
  repository: harbor.middleware.com/middleware
  predixyImageTag: latest

# cluster or sentinel
type: cluster


redis:
  replicas: 6
  resources:
    limits:
      cpu: "1"
      memory: 1024Mi
    requests:
      cpu: "0.2"
      memory: 512Mi

sentinel:
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 2048Mi

predixy:
  enableProxy: true
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 2048Mi

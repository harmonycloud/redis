args:
  maxmemory-policy: volatile-lru
  renameCommand:
    # - CONFIG ""
    # - SHUTDOWN ""
    - KEYS NOKEYS
    - FLUSHDB ""
    - FLUSHALL ""

additionArgs: {}

storageSize: 5Gi
#storageClassName: default

# Redis version sets 7.2.8 by default, Optional versions are 6.2.18, 6.2.16, 7.2.8, 7.2.4, 7.0.12, 7.0.15
version: "7.2.8"
# sentinel/cluster
type: sentinel

image:
  repository: harbor.middleware.com/middleware
  logrotateImageTag: 3.21.0-1.0.0
  pullPolicy: IfNotPresent
  redisImageTag: 5.0.8-1.1.1
  redisImageTag_6: 6.2.6-1.2.0
  redisImageTag_6_11: 6.2.11-1.2.0
  redisImageTag_6_2_14: 6.2.14-1.2.0
  redisImageTag_6_2_16: 6.2.16-1.0.0
  redisImageTag_6_2_18: 6.2.18-1.0.0
  redisImageTag_7_0_12: 7.0.12-1.2.0
  redisImageTag_7_0_15: 7.0.15
  redisImageTag_7_2_4: 7.2.4-1.2.0
  redisImageTag_7_2_8: 7.2.8-1.0.0
  exporterImageTag: v1.0.5-1.0.0
  initImageTag: "v1.7.3"
  testImageTag: v0.3
  predixyImageTag: v1.0.3-1.0.0
  predixyExporterImageTag: v0.0.2-1.0.0

# 支持扩展spec
statefulSetConfiguration: {}
sentinelConfiguration: {}

nameOverride: ""
fullnameOverride: ""

# 升级方式
updateStrategy:
  type: AutoReceive

# global const environment variables for all redis, proxy, sentinel, exporter containers.
env:
  TZ: Asia/Shanghai

# global host volume mappings(host to container) for specific containers
hostVolumes: []

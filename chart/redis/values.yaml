redis:
  externalAccess: {}
  #    enabled: false
  #    addresses:
  #      redis-0: 10.10.102.125:30421
  #      redis-1: 10.10.102.125:30607
  #      redis-2: 10.10.102.125:30312
  #      redis-3: 10.10.102.125:31087
  #      redis-4: 10.10.102.125:30719
  #      redis-5: 10.10.102.125:32205
  #    busPorts:
  #      redis-0: 32016
  #      redis-1: 32002
  #      redis-2: 30783
  #      redis-3: 31525
  #      redis-4: 30271
  #      redis-5: 30450
  #   sentinelAddresses:
  #      redis-sentinel-0: 10.10.102.125:31455
  #      redis-sentinel-1: 10.10.102.125:30507
  #      redis-sentinel-2: 10.10.102.125:30955
  command: /bin/launch.sh
  securityContext: {}
  #    runAsUser: 1000
  replicas: 6
  hostNetwork: false
  port: 6379
  # specific Affinity rules for redis pods and predixy pods.
  # if set, it will override the golbal affinity rules.
  nodeAffinity: {}
  topologyKey: ""
  resources:
    limits:
      cpu: "0.2"
      memory: 512Mi
    requests:
      cpu: "0.2"
      memory: 512Mi

sentinel:
  # deployMethod, default is deployment, optional values are statefulset,
  # if you want to expose sentinel pods ip, in externalAccess,
  # you should set deployMethod to statefulset.

  #  deployMethod: statefulset
  command: /bin/launch.sh
  args: {}
  #   down-after-milliseconds: "1000"
  #   failover-timeout: "3000"
  securityContext: {}
  #    runAsUser: 1000
  replicas: 3
  hostNetwork: false
  port: 26379
  # specific deployment update strategy for sentinel pods.
  # if set, it will override the default updateStrategy.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

exporter:
  port: 9121
  sentinelPort: 9121 # exporter port in sentinel
  rdbScan: {}
  # rdbScan configuration
  #  enable: true
  #  interval: 10
  #  bigKeyLen: 5
  #  bigKeyThreshold: 1000

# Global node affinity rules for all pods.
nodeAffinity: {}
# Global pod topologKey rules for all pods.
# if k8s version is >= 1.19, this field is set in topologySpreadConstraints field.
# if k8s version is < 1.19, this field is set in podAntiAffinity field.
podAntiAffinityTopologKey: "kubernetes.io/hostname"

tolerations: []
#- key: "example-key"
#  operator: "Exists"
#  effect: "NoSchedule"

annotations: {}

labels: {}

#取值[hard|soft] hard:强制反亲和 soft:非强制反亲和
podAntiAffinity: "soft"

predixy:
  args: {}
  #    master-read-priority: "90"
  #    static-slave-read-priority: "50"
  #    dynamic-slave-read-priority: "50"
  #    refresh-interval: "1"
  #    server-timeout: "1"
  #    server-failure-limit: "10"
  #    server-retry-timeout: "1"
  #    keep-alive: "120"
  securityContext: {}
  #    runAsUser: 1000
  enableProxy: false
  hostNetwork: false
  port: 7617
  exporterPort: 9121
  replicas: 1
  # specific deployment update strategy for predixy pods.
  # if set, it will override the default updateStrategy.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 512Mi
  exporterResources:
    requests:
      cpu: 25m
      memory: 50Mi
    limits:
      cpu: 50m
      memory: 100Mi

clusterMultiSts:
  shards: 3
  replicas: 2
  scheduler: "default-scheduler"


---
# Source: redis/charts/redis-operator/templates/redis-operator.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reidsxxxxx-redis-operator
  labels:
    helm.sh/chart: redis-operator-2.15.0
    app.kubernetes.io/name: redis-operator
    app.kubernetes.io/instance: reidsxxxxx
    app.kubernetes.io/version: "2.15.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-operator
      app.kubernetes.io/instance: reidsxxxxx
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-operator
        app.kubernetes.io/instance: reidsxxxxx
    spec:
      securityContext:
        {}
      containers:
        - name: redis-operator
          securityContext:
            {}
          image: "harbor.middleware.com/middleware/redis-operator:v2.15.0"
          command:
            - /manager
            - --v=5
            - --leader-elect=true
            - --enable-redis-shake=false
            - --workers=8
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: CRD_GROUP
              value: harmonycloud
            - name: aliyun_logs_middlewarestdout
              value: stdout
            - name: aliyun_logs_middlewarestdout_tags
              value: middleware_name=reidsxxxxx-redis-operator
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reidsxxxxx
      serviceAccount: reidsxxxxx-redis-operator

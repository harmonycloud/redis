---
# Source: redis/templates/redis-cluster.yaml
apiVersion: redis.middleware.hc.cn/v1alpha1
kind: RedisCluster
metadata:
  annotations:
    datapath: /data/redis/cluster.local/nsxxxxxx/reidsxxxxx-redis/{POD_NAME}/data
  labels:
    nephele/user: admin
  name: reidsxxxxx-redis
spec:
  env:
    TZ: Asia/Shanghai
  statefulset:
    spec:
      template:
        metadata:
        spec:
  deployment:
    spec:
      template:
        metadata:
        spec:
  type: sentinel
  sentinel:
    affinity:
    topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: reidsxxxxx-redis
          component: reidsxxxxx-redis-sentinel
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: REDIS_INSTANCE_PORT
      value: "26379"
    - name: TYPE
      value: "sentinel"
    - name: PODIP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    readinessProbe:
      exec:
        command:
        - sh
        - -c
        - redis-cli -h $POD_IP -p 26379 ping
      timeoutSeconds: 5
    livenessProbe:
      exec:
        command:
        - sh
        - -c
        - redis-cli -h $POD_IP -p 26379 ping
      timeoutSeconds: 5
    args: {}
    command: /bin/launch.sh
    hostNetwork: false
    port: 26379
    replicas: 3
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    securityContext: {}
    strategy:
      rollingUpdate:
        maxUnavailable: 1
      type: RollingUpdate
  pod:
  - affinity:
    topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname      
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchExpressions:
          - key: app
            operator: In
            values:
              - reidsxxxxx-redis
          - key: component
            operator: NotIn
            values:
              - reidsxxxxx-redis-sentinel
              - reidsxxxxx-redis-predixy
    annotations:
      fixed-node-middleware-pod: "true"
      fixed.ipam.harmonycloud.cn: "true"
    configmap: reidsxxxxx-redis-config
    env:
    - name: MAXMEMORY
      value: 
    - name: SYS_CODE
      value: reidsxxxxx-redis
    labels:
      harmonycloud.cn/statefulset: reidsxxxxx-redis
      middleware: redis
      nephele/user: admin
    middlewareImage: redis-cli-v7-port:7.2.8-1.0.0
    initImage: redis-init:v1.7.3
    monitorImage: redis-exporter:v1.0.5-1.0.0
    logrotateImage: logrotate:3.21.0-1.0.0
    requirepass: "Hc@Cloud01"
    imagePullPolicy: IfNotPresent
    hostNetwork: false
    resources:
      limits:
        cpu: "0.2"
        memory: 512Mi
      requests:
        cpu: "0.2"
        memory: 512Mi
    updateStrategy: {}
    command: /bin/launch.sh
  exporter:
    port: 9121
    rdbScan: {}
    sentinelPort: 9121
    port: 9121
  podManagementPolicy: Parallel
  replicas: 6
  servicePort: 6379
  repository: harbor.middleware.com/middleware/
  updateStrategy:
    type: AutoReceive
  version: "7.2.8"
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

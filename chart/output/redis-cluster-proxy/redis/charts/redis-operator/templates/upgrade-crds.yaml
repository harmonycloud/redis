---
# Source: redis/charts/redis-operator/templates/upgrade-crds.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-redis-operator-install-crds
  namespace: default
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "2"
  labels:
    app.kubernetes.io/name: redis-redis-operator
    app.kubernetes.io/instance: redis
    app.kubernetes.io/managed-by: Helm
spec:
  backoffLimit: 3
  template:
    metadata:
      name: redis-redis-operator-install-crds
    spec:
      serviceAccountName: redis-redis-operator-install-crds
      containers:
        - name: kubectl
          image: "harbor.middleware.com/middleware/kubectl:1.21"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - kubectl apply -f /tmp/
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - mountPath: /tmp
              name: crds
      volumes:
        - name: crds
          configMap:
            name: redis-redis-operator-install-crds
      restartPolicy: OnFailure

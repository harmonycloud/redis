---
# Source: redis/templates/redis-cluster.yaml
apiVersion: redis.middleware.hc.cn/v1alpha1
kind: RedisCluster
metadata:
  annotations:
    datapath: /data/redis/cluster.local/default/redis/{POD_NAME}/data
  labels:
    nephele/user: admin
  name: redis
spec:
  env:
    TZ: Asia/Shanghai
  statefulset:
    spec:
      template:
        metadata:
        spec:
  type: cluster
  predixy:
    image: predixy:v1.0.3-1.0.0
    exporterImage: predixy-exporter:v0.0.2-1.0.0
    affinity:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname        
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: redis
            component: redis-predixy
    args: {}
    enableProxy: true
    exporterPort: 9121
    exporterResources:
      limits:
        cpu: 50m
        memory: 100Mi
      requests:
        cpu: 25m
        memory: 50Mi
    hostNetwork: false
    port: 7617
    replicas: 3
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 512Mi
    securityContext: {}
    strategy:
      rollingUpdate:
        maxUnavailable: 1
      type: RollingUpdate
  pod:
  - affinity:
    topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname      
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchExpressions:
          - key: app
            operator: In
            values:
              - redis
          - key: component
            operator: NotIn
            values:
              - redis-sentinel
              - redis-predixy
    annotations:
      fixed-node-middleware-pod: "true"
      fixed.ipam.harmonycloud.cn: "true"
    configmap: redis-config
    env:
    - name: MAXMEMORY
      value: 
    - name: SYS_CODE
      value: redis
    labels:
      harmonycloud.cn/statefulset: redis
      middleware: redis
      nephele/user: admin
    middlewareImage: redis-cli-v7-port:7.2.8-1.0.0
    initImage: redis-init:v1.7.3
    monitorImage: redis-exporter:v1.0.5-1.0.0
    logrotateImage: logrotate:3.21.0-1.0.0
    requirepass: "Hc@Cloud01"
    imagePullPolicy: IfNotPresent
    hostNetwork: false
    resources:
      limits:
        cpu: "0.2"
        memory: 512Mi
      requests:
        cpu: "0.2"
        memory: 512Mi
    updateStrategy: {}
    command: /bin/launch.sh
  exporter:
    port: 9121
    rdbScan: {}
    sentinelPort: 9121
    port: 9121
  podManagementPolicy: Parallel
  replicas: 6
  servicePort: 6379
  repository: harbor.middleware.com/middleware/
  updateStrategy:
    type: AutoReceive
  version: "7.2.8"
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

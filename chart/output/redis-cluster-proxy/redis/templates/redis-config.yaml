---
# Source: redis/templates/redis-config.yaml
apiVersion: v1
data:
  redis.conf: |-
    cluster-enabled yes
    masterauth {REDIS_PASS}
    appendonly no
    lua-time-limit 5000
    slowlog-log-slower-than 10000
    maxmemory 409mb
    zset-max-ziplist-entries 128
    cluster-config-file nodes-{REDIS_INSTANCE_PORT}.conf
    save 60 10000
    tcp-backlog 511
    tcp-keepalive 60
    dir /{PATH_PREFIX}/redis/{DOMAIN_NAME}/{NAMESPACE}/{REDIS_CLUSTER_NAME}/{POD_NAME}/data
    stop-writes-on-bgsave-error no
    slave-serve-stale-data yes
    timeout 300
    pidfile /{PATH_PREFIX}/redis/{DOMAIN_NAME}/{NAMESPACE}/{REDIS_CLUSTER_NAME}/{POD_NAME}/log/redis-{REDIS_INSTANCE_PORT}.pid
    activerehashing yes
    cluster-announce-ip {PODIP}
    dbfilename dump-{REDIS_INSTANCE_PORT}.rdb
    hz 10
    bind {PODIP} 127.0.0.1
    cluster-node-timeout 15000
    repl-timeout 60
    repl-backlog-size 256mb
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    hash-max-ziplist-value 64
    databases 16
    slave-read-only yes
    daemonize no
    latency-monitor-threshold 0
    hash-max-ziplist-entries 512
    logfile "{PATH_PREFIX}/redis/{DOMAIN_NAME}/{NAMESPACE}/{REDIS_CLUSTER_NAME}/{POD_NAME}/log/{SYS_CODE}-redis-{REDIS_INSTANCE_PORT}.log"
    aclfile "{PATH_PREFIX}/redis/{DOMAIN_NAME}/{NAMESPACE}/{REDIS_CLUSTER_NAME}/{POD_NAME}/config/user.acl"
    rdbchecksum yes
    cluster-require-full-coverage no
    client-output-buffer-limit replica 409mb 204mb 120
    maxclients 15000
    slave-priority 100
    hll-sparse-max-bytes 3000
    repl-disable-tcp-nodelay no
    port {REDIS_INSTANCE_PORT}
    slowlog-max-len 1000
    loglevel notice
    set-max-intset-entries 512
    zset-max-ziplist-value 64
    rdbcompression yes
    requirepass {REDIS_PASS}
    maxmemory-policy volatile-lru
    cluster-replica-validity-factor 0
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    ignore-warnings ARM64-COW-BUG
    rename-command KEYS NOKEYS
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
kind: ConfigMap
metadata:
  name: redis-config

apiVersion: middleware.cn/v1
kind: MiddlewareOperatorBaseline
metadata:
  name: redis-operator-standard
  annotations:
    baselineName: "RedisOperator Standard"
    description: "Standard Baseline,incorporating core functionality and essential dependencies, is tailored for rapid deployment and fundamental application scenarios. It delivers stable and reliable performance, and is designed for ease of extension and maintenance."
spec:
  gvks:
    - name: v1alpha1
      group: "redis.middleware.hc.cn"
      version: "v1alpha1"
      kind: "RedisCluster"
  globe:
    repository: "10.10.101.172:443"
    project: "middleware"
    # resource:
    #   limits:
    #     cpu: "200m"
    #     memory: "512Mi"
    #   requests:
    #     cpu: "100m"
    #     memory: "256Mi"
  preActions:
    - name: pre-redis-operator-alertrule-labels
      parameters:
        labels: {}
      exposed: false
    - name: pre-redis-operator-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: { }
      exposed: true
    - name: pre-redis-operator-tolerations
      parameters:
        tolerations: [ ]
      exposed: true
  permissionScope: "Cluster"
  permissions:
    - serviceAccountName: "{{ .Globe.Name }}-redis-operator"
      rules:
        - apiGroups:
            - apiextensions.k8s.io
          resources:
            - customresourcedefinitions
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - endpoints
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - statefulsets
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
            - delete
        - apiGroups:
            - ""
          resources:
            - services
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - controllerrevisions
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - events
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - pods
          verbs:
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - redis.middleware.hc.cn
          resources:
            - redisclusters
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - pods/exec
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - nodes
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - redis.middleware.hc.cn
          resources:
            - redisclusters/status
            - redisshakes
            - redisshakes/status
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - policy
          resources:
            - poddisruptionbudgets
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - configmaps
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - deployments
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
            - delete
        - apiGroups:
            - coordination.k8s.io
          resources:
            - leases
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups: [ "" ]
          resources:
            - secrets
          verbs:
            - get
            - list
  deployment:
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: redis-operator
          app.kubernetes.io/instance: "{{ .Globe.Name }}"
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          labels:
            app.kubernetes.io/name: redis-operator
            app.kubernetes.io/instance: "{{ .Globe.Name }}"
        spec:
          containers:
            - name: "{{ .Globe.Name }}"
              image: '{{ if ne .Globe.repository "" }}{{ .Globe.repository }}/{{ end }}{{ .Globe.project }}/redis-operator:v2.18.2'
              command:
                - /manager
                - --v=5
                - --leader-elect=true
                - --enable-redis-shake=false
                - --workers=8
              imagePullPolicy: IfNotPresent
              env:
                - name: TZ
                  value: Asia/Shanghai
                - name: CRD_GROUP
                  value: harmonycloud
                - name: aliyun_logs_middlewarestdout
                  value: stdout
                - name: aliyun_logs_middlewarestdout_tags
                  value: middleware_name=redis-redis-operator
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              resources:
                limits:
                  cpu: 200m
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 256Mi
          affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - redis
          serviceAccount: "{{ .Globe.Name }}-redis-operator"
  configurations:
    - name: crd-redisclusters
      values: { }
    - name: crd-redisshakes
      values: { }
    - name: redis-operator-alertrule
      values: { }
    - name: redis-operator-dashboard
      values: { }
    - name: redis-operator-service
      values: { }
    - name: redis-operator-servicemonitor
      values: { }
